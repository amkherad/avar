title: Avar
# BCP 47 tag for the active site language (used by jekyll-rtd-theme i18n includes).
# Must be a single value, not a list — the theme loads _includes/i18n/<lang>.liquid.
lang: en
description: A cross-platform download manager with CLI, daemon, GUI, and browser extensions.

remote_theme: Appdynamics/jekyll-rtd-theme

# Site URLs — update these placeholders when you host the documentation.
url: ''
baseurl: '/avar'
repository: 'https://github.com/amkherad/avar'
repo_url: 'https://github.com/amkherad/avar'
download_url: 'https://github.com/amkherad/avar/releases'
issues_url: 'https://github.com/amkherad/avar/issues'

nav_version: true
edit: false
addons_branch: true

author: Ali Kherad

addons:
  - github
  - analytics

sass:
  style: compressed

copyright:
  revision: true

readme_index:
  with_frontmatter: true

plugins:
  - jemoji
  - jekyll-avatar
  - jekyll-mentions
  - jekyll-github-metadata

exclude:
  - Makefile
  - CNAME
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - requirements.txt
  - node_modules
  - package.json
  - package-lock.json
  - jekyll-rtd-theme.gemspec
