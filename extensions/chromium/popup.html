<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Avar</title>
    <style>
      :root {
        color-scheme: dark;
      }

      html {
        width: 420px;
        height: 560px;
        min-width: 320px;
        max-width: 760px;
        overflow: hidden;
      }

      body {
        font-family: system-ui, sans-serif;
        margin: 0;
        width: 100%;
        height: 100%;
        box-sizing: border-box;
        background: #0f172a;
        color: #e2e8f0;
        overflow: hidden;
      }

      .popup-root {
        position: relative;
        display: flex;
        flex-direction: column;
        height: 100%;
        padding: 12px;
        box-sizing: border-box;
        overflow: hidden;
      }

      .header {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
        flex-shrink: 0;
      }

      .header img {
        width: 24px;
        height: 24px;
        flex-shrink: 0;
      }

      .header-title {
        flex: 1;
        min-width: 0;
      }

      .header-title h1 {
        font-size: 1rem;
        margin: 0;
        line-height: 1.2;
      }

      .header-subtitle {
        margin: 1px 0 0;
        font-size: 0.68rem;
        font-weight: 500;
        color: #64748b;
        line-height: 1.2;
      }

      .header-actions {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-shrink: 0;
      }

      .connection-status {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .connection-status__label {
        font-size: 0.68rem;
        color: #94a3b8;
        white-space: nowrap;
      }

      .connection-status__label--ok {
        color: #86efac;
      }

      .header-actions__sep {
        width: 1px;
        height: 20px;
        background: #334155;
        flex-shrink: 0;
      }

      .icon-btn {
        margin: 0;
        width: 28px;
        height: 28px;
        padding: 0;
        border: none;
        border-radius: 6px;
        background: #334155;
        color: #e2e8f0;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      .icon-btn:hover {
        background: #475569;
      }

      .icon-btn svg {
        width: 16px;
        height: 16px;
        fill: currentColor;
      }

      .status-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #ef4444;
        flex-shrink: 0;
      }

      .status-dot--ok {
        background: #22c55e;
      }

      .main-view {
        display: flex;
        flex-direction: column;
        flex: 1;
        min-height: 0;
        overflow: hidden;
      }

      .main-view[hidden],
      .settings-view[hidden] {
        display: none;
      }

      .settings-view {
        display: flex;
        flex-direction: column;
        flex: 1;
        min-height: 0;
        margin-top: 4px;
      }

      .settings-view__toolbar {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
        flex-shrink: 0;
      }

      .settings-view__heading {
        margin: 0;
        font-size: 0.95rem;
        font-weight: 600;
      }

      .settings-view__body {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        overflow-x: hidden;
        padding-right: 2px;
      }

      .settings-view__footer {
        flex-shrink: 0;
        padding-top: 10px;
        margin-top: 8px;
        border-top: 1px solid #334155;
        background: #0f172a;
      }

      .settings-section-title {
        margin: 10px 0 4px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #cbd5e1;
      }

      label {
        display: block;
        font-size: 0.75rem;
        margin-top: 8px;
        color: #94a3b8;
      }

      input,
      select {
        width: 100%;
        box-sizing: border-box;
        margin-top: 4px;
        padding: 6px 8px;
        border-radius: 6px;
        border: 1px solid #334155;
        background: #1e293b;
        color: inherit;
      }

      .queue-management {
        margin-top: 4px;
        max-height: 140px;
        overflow-y: auto;
        border: 1px solid #334155;
        border-radius: 6px;
        background: #1e293b;
      }

      .queue-management__empty {
        margin: 0;
        padding: 8px;
        font-size: 0.72rem;
        color: #64748b;
      }

      .queue-row {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 6px 8px;
        border-bottom: 1px solid #334155;
        font-size: 0.75rem;
      }

      .queue-row:last-child {
        border-bottom: none;
      }

      .queue-row__name {
        flex: 1;
        min-width: 0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .queue-row__status {
        font-size: 0.65rem;
        padding: 1px 5px;
        border-radius: 4px;
        background: #334155;
        color: #94a3b8;
        flex-shrink: 0;
      }

      .queue-row__status--running {
        background: #14532d;
        color: #86efac;
      }

      .queue-row__btn {
        margin: 0;
        padding: 2px 6px;
        border: none;
        border-radius: 4px;
        background: #334155;
        color: #e2e8f0;
        font-size: 0.65rem;
        cursor: pointer;
        flex-shrink: 0;
      }

      .queue-row__btn:hover {
        background: #475569;
      }

      button.primary {
        margin: 0;
        width: 100%;
        padding: 8px;
        border: none;
        border-radius: 6px;
        background: #38bdf8;
        color: #0f172a;
        font-weight: 600;
        cursor: pointer;
      }

      button.primary:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      button.secondary {
        margin-top: 8px;
        width: 100%;
        padding: 8px;
        border: none;
        border-radius: 6px;
        background: #334155;
        color: #e2e8f0;
        font-weight: 600;
        cursor: pointer;
        flex-shrink: 0;
      }

      button.secondary:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .status-row {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-top: 4px;
        flex-shrink: 0;
      }

      #status {
        margin: 0;
        font-size: 0.75rem;
        color: #94a3b8;
        min-height: 1rem;
        flex: 1;
        min-width: 0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      #mediaTypeFilter,
      #mediaSort {
        width: auto;
        min-width: 72px;
        margin: 0;
        flex-shrink: 0;
        font-size: 0.72rem;
        padding: 4px 6px;
      }

      #mediaSort {
        min-width: 96px;
        max-width: 120px;
      }

      ul {
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .media-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 0;
        border-bottom: 1px solid #334155;
      }

      .media-item__type-icon {
        width: 20px;
        height: 20px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: #94a3b8;
        flex-shrink: 0;
      }

      .media-item__type-icon svg {
        width: 16px;
        height: 16px;
        fill: currentColor;
      }

      .media-item__info {
        flex: 1;
        min-width: 0;
      }

      .media-item__name {
        font-size: 0.8rem;
        font-weight: 600;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .media-item__meta {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-top: 1px;
        min-width: 0;
      }

      .media-item__size {
        font-size: 0.65rem;
        color: #94a3b8;
        flex-shrink: 0;
        min-width: 3.5rem;
      }

      .media-item__size--pending {
        color: #64748b;
      }

      .media-item__url-row {
        display: flex;
        align-items: center;
        gap: 4px;
        margin-top: 2px;
        min-width: 0;
      }

      .media-item__copy {
        width: 22px;
        height: 22px;
      }

      .media-item__copy svg {
        width: 14px;
        height: 14px;
      }

      .media-item__url {
        font-size: 0.68rem;
        color: #64748b;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        min-width: 0;
      }

      .media-item__actions {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-shrink: 0;
      }

      .media-item__sep {
        width: 1px;
        height: 24px;
        background: #334155;
        flex-shrink: 0;
      }

      .media-item__download-wrap {
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .media-item__download-wrap[title] {
        cursor: not-allowed;
      }

      .media-item__download {
        margin: 0;
        width: 30px;
        height: 30px;
        padding: 0;
        border: none;
        border-radius: 6px;
        background: #38bdf8;
        color: #0f172a;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .media-item__download:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .media-item__download svg {
        width: 16px;
        height: 16px;
        fill: currentColor;
      }

      .media-kind {
        display: inline-block;
        margin-left: 4px;
        padding: 1px 4px;
        border-radius: 4px;
        font-size: 0.6rem;
        font-weight: 700;
        text-transform: uppercase;
        background: #1e3a5f;
        color: #7dd3fc;
        vertical-align: middle;
      }

      .media-scroll {
        display: flex;
        flex-direction: column;
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        margin-top: 8px;
      }

      #selectedSection[hidden] {
        display: none;
      }

      .section-label {
        margin: 0 0 4px;
        font-size: 0.72rem;
        font-weight: 600;
        color: #cbd5e1;
        text-transform: uppercase;
        letter-spacing: 0.03em;
      }

      #selectedLinksList {
        flex: none;
        overflow: visible;
      }

      #mediaList {
        margin: 0;
      }

      .list-separator {
        margin: 16px 0;
        border: none;
        border-top: 1px solid #475569;
        flex-shrink: 0;
      }

      .view-tabs {
        flex-shrink: 0;
        margin-top: 8px;
      }

      .view-tabs[hidden] {
        display: none;
      }

      .view-tabs__bar {
        display: flex;
        gap: 4px;
        padding: 3px;
        border-radius: 8px;
        background: #1e293b;
      }

      .view-tabs__tab {
        flex: 1;
        margin: 0;
        padding: 6px 10px;
        border: none;
        border-radius: 6px;
        background: transparent;
        color: #94a3b8;
        font-size: 0.72rem;
        font-weight: 600;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
      }

      .view-tabs__tab:hover {
        color: #e2e8f0;
        background: #334155;
      }

      .view-tabs__tab[aria-selected="true"] {
        background: #334155;
        color: #e2e8f0;
      }

      .view-tabs__count {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 1.25rem;
        padding: 1px 5px;
        border-radius: 999px;
        font-size: 0.62rem;
        font-weight: 700;
        background: #0f172a;
        color: #cbd5e1;
      }

      .view-tabs__tab[aria-selected="true"] .view-tabs__count {
        background: #0f172a;
        color: #7dd3fc;
      }

      .media-scroll--tabbed #selectedSection.media-panel--hidden,
      .media-scroll--tabbed #mediaList.media-panel--hidden {
        display: none;
      }

      .media-scroll--tabbed #selectedSection[hidden] {
        display: none;
      }

      .media-scroll--tabbed .section-label,
      .media-scroll--tabbed .list-separator {
        display: none;
      }

      #downloadSelected {
        margin-top: 4px;
        margin-bottom: 8px;
      }

      .settings-checkbox {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 10px;
        font-size: 0.75rem;
        color: #94a3b8;
        cursor: pointer;
      }

      .settings-checkbox input {
        width: auto;
        margin: 0;
      }

      .settings-range {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 4px;
      }

      .settings-range input[type="range"] {
        flex: 1;
        margin: 0;
        padding: 0;
      }

      .settings-range__value {
        min-width: 2.75rem;
        text-align: right;
        color: #e2e8f0;
        font-variant-numeric: tabular-nums;
      }

      .resize-handle {
        position: absolute;
        z-index: 20;
        touch-action: none;
      }

      .resize-handle--left {
        left: 0;
        top: 16px;
        bottom: 16px;
        width: 10px;
        cursor: ew-resize;
      }

      .resize-handle--left::before {
        content: "";
        position: absolute;
        top: 50%;
        left: 3px;
        width: 3px;
        height: 36px;
        border-radius: 2px;
        background: #475569;
        transform: translateY(-50%);
      }

      .resize-handle--bottom {
        left: 16px;
        right: 16px;
        bottom: 0;
        height: 10px;
        cursor: ns-resize;
      }

      .resize-handle--bottom::before {
        content: "";
        position: absolute;
        left: 50%;
        bottom: 3px;
        width: 36px;
        height: 3px;
        border-radius: 2px;
        background: #475569;
        transform: translateX(-50%);
      }

      .resize-handle[hidden] {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="popup-root">
      <div class="header">
        <img src="icons/icon-48.png" alt="" />
        <div class="header-title">
          <h1>Avar</h1>
          <p class="header-subtitle">Download Helper</p>
        </div>
        <div class="header-actions">
          <div class="connection-status">
            <span id="bridgeStatusLabel" class="connection-status__label">Disconnected</span>
            <span id="bridgeStatus" class="status-dot" title="Avar bridge connection"></span>
          </div>
          <span class="header-actions__sep" aria-hidden="true"></span>
          <button
            id="settingsBtn"
            class="icon-btn"
            type="button"
            aria-label="Settings"
            aria-pressed="false"
            title="Settings"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M12 15.5A3.5 3.5 0 0 1 8.5 12 3.5 3.5 0 0 1 12 8.5a3.5 3.5 0 0 1 3.5 3.5 3.5 3.5 0 0 1-3.5 3.5m7.43-2.53c.04-.32.07-.64.07-.97 0-.33-.03-.66-.07-1l2.11-1.63c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.31-.61-.22l-2.49 1c-.52-.4-1.06-.73-1.69-.98l-.37-2.65A.506.506 0 0 0 14 2h-4c-.25 0-.46.18-.5.42l-.37 2.65c-.63.25-1.17.59-1.69.98l-2.49-1c-.22-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64L4.57 11c-.04.34-.07.67-.07 1 0 .33.03.65.07.97l-2.11 1.66c-.19.15-.25.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1.01c.52.4 1.06.74 1.69.99l.37 2.65c.04.24.25.42.5.42h4c.25 0 .46-.18.5-.42l.37-2.65c.63-.26 1.17-.59 1.69-.99l2.49 1.01c.22.08.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.66Z"
              />
            </svg>
          </button>
        </div>
      </div>

      <div id="mainView" class="main-view">
        <div class="status-row">
          <button id="refreshBtn" class="icon-btn" type="button" aria-label="Refresh scan" title="Scan page again">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M17.65 6.35A7.958 7.958 0 0 0 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0 1 12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"
              />
            </svg>
          </button>
          <p id="status"></p>
          <select id="mediaSort" aria-label="Sort media" title="Sort media list">
            <option value="type">By type</option>
            <option value="size-asc">By size (smallest first)</option>
            <option value="size-desc">By size (largest first)</option>
          </select>
          <select id="mediaTypeFilter" aria-label="Media type filter" title="Filter media by type">
            <option value="all">All</option>
            <option value="video">Video</option>
            <option value="audio">Audio</option>
            <option value="image">Image</option>
            <option value="binary">Binary</option>
          </select>
        </div>

        <div id="viewTabs" class="view-tabs" hidden>
          <div class="view-tabs__bar" role="tablist" aria-label="Media list tabs">
            <button
              id="viewTabSelected"
              class="view-tabs__tab"
              type="button"
              role="tab"
              aria-selected="false"
              aria-controls="selectedSection"
            >
              Selected
              <span id="viewTabSelectedCount" class="view-tabs__count">0</span>
            </button>
            <button
              id="viewTabMedia"
              class="view-tabs__tab"
              type="button"
              role="tab"
              aria-selected="true"
              aria-controls="mediaList"
            >
              Media
              <span id="viewTabMediaCount" class="view-tabs__count">0</span>
            </button>
          </div>
        </div>

        <div id="mediaScroll" class="media-scroll">
          <section id="selectedSection" hidden>
            <p class="section-label">Selected links</p>
            <button id="downloadSelected" class="primary" type="button">Download all selected</button>
            <ul id="selectedLinksList"></ul>
            <hr class="list-separator" aria-hidden="true" />
          </section>
          <ul id="mediaList"></ul>
        </div>
        <button id="downloadAll" class="secondary" type="button" hidden>Download all on page</button>
      </div>

      <div id="settingsView" class="settings-view" hidden>
        <div class="settings-view__toolbar">
          <button id="settingsBackBtn" class="icon-btn" type="button" aria-label="Back" title="Back to media list">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z" />
            </svg>
          </button>
          <h2 class="settings-view__heading">Settings</h2>
        </div>

        <div class="settings-view__body">
          <label>
            Avar bridge URL
            <input id="bridgeUrl" type="url" placeholder="http://127.0.0.1:18766" />
          </label>

          <label>
            Default download queue
            <select id="defaultQueue">
              <option value="">Default queue</option>
            </select>
          </label>

          <label>
            Default media type filter
            <select id="defaultMediaFilter">
              <option value="all">All</option>
              <option value="video">Video</option>
              <option value="audio">Audio</option>
              <option value="image">Image</option>
              <option value="binary">Binary</option>
            </select>
          </label>

          <label class="settings-checkbox">
            <input id="showSelectionWidget" type="checkbox" checked />
            Show download widget when multiple links are selected
          </label>

          <label>
            Selection widget opacity
            <div class="settings-range">
              <input
                id="selectionWidgetOpacity"
                type="range"
                min="40"
                max="100"
                step="1"
                value="100"
              />
              <span id="selectionWidgetOpacityValue" class="settings-range__value">100%</span>
            </div>
          </label>

          <label class="settings-checkbox">
            <input id="selectedLinksInSeparateTab" type="checkbox" />
            Put selected links in a separate tab
          </label>

          <p class="settings-section-title">Browser downloads</p>

          <label class="settings-checkbox">
            <input id="grabAllDownloads" type="checkbox" />
            Grab all browser downloads and send them to Avar
          </label>

          <label class="settings-checkbox">
            <input id="blockBrowserDownloads" type="checkbox" />
            Prevent the browser from saving files (queue in Avar instead)
          </label>

          <p class="settings-section-title">Queue management</p>
          <div id="queueManagement" class="queue-management">
            <p class="queue-management__empty">Connect to Avar to load queues.</p>
          </div>
        </div>

        <div class="settings-view__footer">
          <button id="save" class="primary" type="button">Save settings</button>
        </div>
      </div>

      <div class="resize-handle resize-handle--left" data-resize="w" aria-hidden="true" title="Resize width"></div>
      <div
        class="resize-handle resize-handle--bottom"
        data-resize="s"
        hidden
        aria-hidden="true"
        title="Resize height"
      ></div>
    </div>

    <script src="media.js"></script>
    <script src="protocol.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
