name: CI

on:
  push:
    branches: [main, master]
    tags:
      - v*
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup CMake and Ninja
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: "~4.1.0"

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DAVAR_ENABLE_COVERAGE=ON -G Ninja

      - name: Build avar
        run: cmake --build build --parallel

      - name: Run tests
        timeout-minutes: 20
        env:
          PYTHON: python
        run: ctest --test-dir build --output-on-failure

      - name: Install gcovr
        run: pip install gcovr

      - name: Coverage report (Cobertura)
        run: python scripts/coverage_report.py --build-dir build --output coverage.xml --skip-configure --skip-build --skip-tests

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: cobertura-coverage-${{ github.sha }}
          path: coverage.xml

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: gui/package-lock.json

      - name: Build GUI
        working-directory: gui
        run: |
          npm ci
          npm run build

      - name: Build avar-gui (embedded frontend)
        run: |
          cmake -S . -B build-gui -DCMAKE_BUILD_TYPE=Release -DAVAR_BUILD_GUI=ON -G Ninja
          cmake --build build-gui --target avar-gui --parallel

      - name: Install Electron build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-0 libnotify4 libnss3 libxss1 libasound2t64 libxtst6

      - name: Build all-in-one avar
        run: python scripts/build_all.py --build-dir build-all --config Release --output-dir dist-all

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: avar-linux-${{ github.sha }}
          path: |
            build/avar
            build-gui/avar-gui
            dist-all/avar
            gui/dist

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test-and-build
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup CMake and Ninja
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: "~4.1.0"

      - name: Build avar (Release)
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -G Ninja
          cmake --build build --parallel

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: gui/package-lock.json

      - name: Build GUI
        working-directory: gui
        run: |
          npm ci
          npm run build

      - name: Build avar-gui
        run: |
          cmake -S . -B build-gui -DCMAKE_BUILD_TYPE=Release -DAVAR_BUILD_GUI=ON -G Ninja
          cmake --build build-gui --target avar-gui --parallel

      - name: Install Electron build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-0 libnotify4 libnss3 libxss1 libasound2t64 libxtst6

      - name: Build all-in-one avar
        run: python scripts/build_all.py --build-dir build-all --config Release --output-dir dist-all

      - name: Package release assets
        run: |
          mkdir -p dist
          cp build/avar dist/avar
          cp build-gui/avar-gui dist/avar-gui
          cp dist-all/avar dist/avar-all
          tar -czf avar-gui-dist.tar.gz -C gui dist
          chmod +x dist/avar dist/avar-gui dist/avar-all

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/avar
            dist/avar-gui
            dist/avar-all
            avar-gui-dist.tar.gz
          generate_release_notes: true
