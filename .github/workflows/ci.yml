name: CI

on:
  push:
    branches: [main, master]
    tags:
      - v*
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup CMake and Ninja
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: "~4.1.0"

      - name: Configure
        run: cmake -S . -B output/build -DCMAKE_BUILD_TYPE=Debug -DAVAR_ENABLE_COVERAGE=ON -G Ninja

      - name: Build avar
        run: cmake --build output/build --parallel

      - name: Run tests
        timeout-minutes: 20
        env:
          PYTHON: python
        run: ctest --test-dir output/build --output-on-failure

      - name: Install gcovr
        run: pip install gcovr

      - name: Coverage report (Cobertura)
        run: python scripts/coverage_report.py --build-dir output/build --skip-configure --skip-build --skip-tests

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: cobertura-coverage-${{ github.sha }}
          path: output/coverage.xml

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: gui/package-lock.json

      - name: Build GUI
        working-directory: gui
        run: |
          npm ci
          npm run build

      - name: Build avar-gui (embedded frontend)
        run: |
          cmake -S . -B output/build-gui -DCMAKE_BUILD_TYPE=Release -DAVAR_BUILD_GUI=ON -G Ninja
          cmake --build output/build-gui --target avar-gui --parallel

      - name: Install Electron build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-0 libnotify4 libnss3 libxss1 libasound2t64 libxtst6

      - name: Build all-in-one avar
        run: python scripts/build_all.py --config Release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: avar-linux-${{ github.sha }}
          path: |
            output/build/avar
            output/build-gui/avar-gui
            output/dist-all/avar
            gui/dist

  tiny-build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux
          - runner: windows-latest
            platform: windows
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: gui/package-lock.json

      - name: Install Tiny native dependencies (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libgtk-3-dev pkg-config
          sudo apt-get install -y libwebkit2gtk-4.1-dev || sudo apt-get install -y libwebkit2gtk-4.0-dev

      - name: Build Tiny shell
        working-directory: gui
        run: |
          npm ci
          npm run build
          node scripts/install-tinytron.cjs
          node tiny/verify-build.cjs

      - name: Upload Tiny native artifact
        uses: actions/upload-artifact@v4
        with:
          name: tiny-native-${{ matrix.platform }}-${{ github.sha }}
          path: gui/node_modules/tinytron/build/Release/addon.node
          if-no-files-found: error
